# E2E Test Workflow
# Recovery: all write tests round-trip to recover funds. Only gas is consumed.
#
# Exercises every command against real APIs/contracts.
# Run on a local W3 network with:
#   w3 workflow deploy test/workflows/e2e.yaml
#   w3 workflow "CoW Swap E2E" trigger
#
# Prerequisites:
#   - W3 local network running (make dev)
#   - W3_SECRET_ETHEREUM (bridge signer with ETH + USDC on Base)
#
# Addresses (Base):
#   WETH: 0x4200000000000000000000000000000000000006
#   USDC: 0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913
#   GPv2Settlement: 0x9008D19f58AAbD9eD0D60971565AA8510560ab41

name: CoW Swap E2E
on:
  workflow_dispatch: {}

jobs:
  # ── Read-only: quote ────────────────────────────────────────────
  quote:
    runs-on: ubuntu-latest
    steps:
      # Quote: sell 0.001 WETH for USDC on Base
      - uses: w3-io/w3-cowswap-action@main
        id: quote
        with:
          command: quote
          chain: base
          sell-token: '0x4200000000000000000000000000000000000006'
          buy-token: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          amount: '1000000000000000'
          from: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      - run: |
          echo "=== Quote ==="
          echo "${{ steps.quote.outputs.result }}"

  # ── Write flow: submit-order -> get-order -> get-trades ─────────
  order-flow:
    runs-on: ubuntu-latest
    steps:
      # 1. Get a quote first
      - uses: w3-io/w3-cowswap-action@main
        id: quote
        with:
          command: quote
          chain: base
          sell-token: '0x4200000000000000000000000000000000000006'
          buy-token: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          amount: '1000000000000000'
          from: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 2. Approve USDC for GPv2Settlement via bridge
      - name: Approve WETH for GPv2Settlement
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow: ['*']
        run: |
          B="${W3_BRIDGE_URL}"
          curl -sf $B/ethereum/approve-token \
            -X POST -H 'Content-Type: application/json' \
            -d '{"network":"base","params":{"token":"0x4200000000000000000000000000000000000006","spender":"0x9008D19f58AAbD9eD0D60971565AA8510560ab41","amount":"115792089237316195423570985008687907853269984665640564039457584007913129639935"}}'

      # 3. Submit the order
      - uses: w3-io/w3-cowswap-action@main
        id: submit
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow: ['*']
        with:
          command: submit-order
          chain: base
          quote: ${{ steps.quote.outputs.result }}
          from: '0xe4E402962943c4EB2253f666575eE12700e78e90'

      # 4. Get the order details
      - uses: w3-io/w3-cowswap-action@main
        id: get-order
        with:
          command: get-order
          chain: base
          order-id: ${{ fromJSON(steps.submit.outputs.result).orderId }}

      # 5. Get trades for the order
      - uses: w3-io/w3-cowswap-action@main
        id: get-trades
        with:
          command: get-trades
          chain: base
          order-id: ${{ fromJSON(steps.submit.outputs.result).orderId }}

      - run: |
          echo "=== Quote ==="
          echo "${{ steps.quote.outputs.result }}"
          echo "=== Submit ==="
          echo "${{ steps.submit.outputs.result }}"
          echo "=== Get Order ==="
          echo "${{ steps.get-order.outputs.result }}"
          echo "=== Get Trades ==="
          echo "${{ steps.get-trades.outputs.result }}"

  # ── Write flow: limit-order -> cancel-order ─────────────────────
  limit-cancel:
    runs-on: ubuntu-latest
    steps:
      # 1. Approve USDC for GPv2Settlement via bridge
      - name: Approve WETH for GPv2Settlement
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow: ['*']
        run: |
          B="${W3_BRIDGE_URL}"
          curl -sf $B/ethereum/approve-token \
            -X POST -H 'Content-Type: application/json' \
            -d '{"network":"base","params":{"token":"0x4200000000000000000000000000000000000006","spender":"0x9008D19f58AAbD9eD0D60971565AA8510560ab41","amount":"115792089237316195423570985008687907853269984665640564039457584007913129639935"}}'

      # 2. Place a limit order (sell 0.001 WETH for min 1 USDC)
      - uses: w3-io/w3-cowswap-action@main
        id: limit
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow: ['*']
        with:
          command: limit-order
          chain: base
          sell-token: '0x4200000000000000000000000000000000000006'
          buy-token: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          amount: '1000000000000000'
          buy-amount: '1000000'
          from: '0xe4E402962943c4EB2253f666575eE12700e78e90'
          valid-for: '3600'

      # 3. Cancel the limit order
      - uses: w3-io/w3-cowswap-action@main
        id: cancel
        env:
          W3_SECRET_ETHEREUM: ${{ secrets.W3_SECRET_ETHEREUM }}
        bridge-allow: ['*']
        with:
          command: cancel-order
          chain: base
          order-id: ${{ fromJSON(steps.limit.outputs.result).orderId }}

      - run: |
          echo "=== Limit Order ==="
          echo "${{ steps.limit.outputs.result }}"
          echo "=== Cancel ==="
          echo "${{ steps.cancel.outputs.result }}"
