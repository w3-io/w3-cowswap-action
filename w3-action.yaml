kind: integration
partner: cowswap
name: CoW Swap Integration
version: 0.1.0
repo: w3-io/w3-cowswap-action
description: >
  CoW Swap is a MEV-protected DEX aggregator that uses batch auctions for
  optimal pricing. Orders are signed off-chain via EIP-712 and only executed
  if the price is met. MEV protection means no frontrunning or sandwich
  attacks. Orders are gasless — the protocol pays gas from solver
  competition. If solvers find a better price than quoted, the surplus goes
  back to the user.
context: >
  Use for protecting large trades from MEV, or when you want gasless swaps
  with surplus sharing. Not for instant execution — CoW batches orders into
  discrete auctions (~30 s), so use Uniswap if you need immediate fills. No
  swap fees for market orders; the protocol earns from solver competition.
  Orders are signed off-chain and only executed if the price condition is
  met, so funds stay safe. Requires a W3 bridge signer for EIP-712 signing.
  Typical pattern: quote → submit-order → get-order (poll for fill).

commands:
  - name: quote
    description: >
      Get a MEV-protected swap quote from CoW Protocol. Returns pricing,
      estimated fees, and the quote object needed for order submission.
    inputs:
      chain:
        type: string
        required: true
        description: Target chain (ethereum, gnosis, arbitrum, base, sepolia)
      sell-token:
        type: string
        required: true
        description: Token to sell (address or "ETH"/"native")
      buy-token:
        type: string
        required: true
        description: Token to buy (address or "ETH"/"native")
      amount:
        type: string
        required: true
        description: Sell amount in base units (before fees)
      from:
        type: string
        required: true
        description: Sender wallet address
    outputs:
      result:
        type: object
        description: Quote object with id, sellAmount, buyAmount, feeAmount

  - name: submit-order
    description: >
      Sign and submit a quoted order to CoW Protocol. Signs the order
      via EIP-712 through the bridge and submits to the CoW API.
    inputs:
      chain:
        type: string
        required: true
        description: Target chain (ethereum, gnosis, arbitrum, base, sepolia)
      quote:
        type: string
        required: true
        description: JSON quote response from the quote command
    outputs:
      result:
        type: object
        description: Order UID for tracking the submitted order

  - name: get-order
    description: >
      Check the status of an existing CoW Protocol order by its UID.
    inputs:
      chain:
        type: string
        required: true
        description: Target chain
      order-id:
        type: string
        required: true
        description: Order UID
    outputs:
      result:
        type: object
        description: Order details with status, amounts, timestamps

  - name: get-trades
    description: >
      Get executed trades (fills) for a CoW Protocol order.
    inputs:
      chain:
        type: string
        required: true
        description: Target chain
      order-id:
        type: string
        required: true
        description: Order UID
    outputs:
      result:
        type: array
        description: Array of trade objects with amounts, txHash, blockNumber

  - name: cancel-order
    description: >
      Cancel an existing CoW Protocol order via signed off-chain
      cancellation. Signs the order UID with EIP-712 using the same
      GPv2Settlement domain as order submission. Requires signer
      access (bridge-allow and W3_SECRET_ETHEREUM).
    inputs:
      chain:
        type: string
        required: true
        description: Target chain (ethereum, gnosis, arbitrum, base, sepolia)
      order-id:
        type: string
        required: true
        description: Order UID to cancel
    outputs:
      result:
        type: object
        description: Cancellation confirmation with orderId

  - name: limit-order
    description: >
      Submit a limit order to CoW Protocol. Gets a quote, overrides
      buyAmount with the specified limit price, sets the expiry, then
      signs and submits the order in one step.
    inputs:
      chain:
        type: string
        required: true
        description: Target chain (ethereum, gnosis, arbitrum, base, sepolia)
      sell-token:
        type: string
        required: true
        description: Token to sell (address or "ETH"/"native")
      buy-token:
        type: string
        required: true
        description: Token to buy (address or "ETH"/"native")
      amount:
        type: string
        required: true
        description: Sell amount in base units (before fees)
      buy-amount:
        type: string
        required: true
        description: Minimum acceptable buy amount (limit price)
      from:
        type: string
        required: true
        description: Sender wallet address
      valid-for:
        type: string
        required: false
        description: Seconds until order expiry (default 3600)
    outputs:
      result:
        type: object
        description: Order UID for tracking the submitted order
