name: 'W3 CoW Swap Action'
description: 'MEV-protected swaps via CoW Protocol batch auctions'
author: 'w3-io'

inputs:
  command:
    description: 'Operation to perform (quote, submit-order, get-order, get-trades, cancel-order, limit-order)'
    required: true
  chain:
    description: 'Target chain (ethereum, gnosis, arbitrum, base, sepolia)'
    required: true
  sell-token:
    description: 'Token to sell (address or "ETH"/"native" for the native token)'
    required: false
  buy-token:
    description: 'Token to buy (address or "ETH"/"native" for the native token)'
    required: false
  amount:
    description: 'Amount to sell in base units (before fees)'
    required: false
  from:
    description: 'Sender wallet address'
    required: false
  receiver:
    description: 'Receiver wallet address (defaults to from)'
    required: false
  quote:
    description: 'JSON quote response from the quote command (for submit-order)'
    required: false
  order-id:
    description: 'Order UID (for get-order, get-trades, and cancel-order commands). cancel-order requires signer access (bridge-allow and W3_SECRET_ETHEREUM).'
    required: false
  buy-amount:
    description: 'Minimum acceptable buy amount in base units (for limit-order)'
    required: false
  valid-for:
    description: 'Seconds until order expiry (for limit-order, default 3600)'
    required: false
    default: '3600'

outputs:
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
